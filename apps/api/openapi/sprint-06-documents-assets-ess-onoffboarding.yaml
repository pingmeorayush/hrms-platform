openapi: 3.1.0
info:
  title: PhoenixHRMS Sprint 06 Documents, Assets, and ESS API
  version: 1.0.0
  description: Tenant-scoped document repository, asset lifecycle, employee task-center, policy acknowledgement, and self-service APIs implemented during Sprint 06.
  license:
    name: Proprietary
    identifier: LicenseRef-PhoenixHRMS-Proprietary
servers:
  - url: https://api.phoenixhrms.test/api/v1
security:
  - bearerAuth: []
paths:
  /documents:
    get:
      operationId: listRepositoryDocuments
      summary: List tenant repository documents within the caller's access scope
      parameters:
        - in: query
          name: document_category_id
          schema:
            type: integer
        - in: query
          name: repository_scope
          schema:
            type: string
            enum: [general, employee, policy, compliance, payroll, asset, onboarding, offboarding]
        - in: query
          name: linked_entity_type
          schema:
            type: string
        - in: query
          name: linked_entity_id
          schema:
            type: integer
        - in: query
          name: visibility_scope
          schema:
            type: string
            enum: [internal, restricted, confidential]
        - in: query
          name: retention_until_from
          schema:
            type: string
            format: date
        - in: query
          name: retention_until_to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Repository documents loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Document'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      operationId: createRepositoryDocument
      summary: Upload a document into the tenant repository
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
      responses:
        '201':
          description: Repository document uploaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Document'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /documents/categories:
    get:
      operationId: listDocumentCategories
      summary: List document categories and governance defaults
      parameters:
        - in: query
          name: repository_scope
          schema:
            type: string
            enum: [general, employee, policy, compliance, payroll, asset, onboarding, offboarding]
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: Document categories loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/DocumentCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      operationId: createDocumentCategory
      summary: Create a document category with retention and role defaults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCategoryRequest'
      responses:
        '201':
          description: Document category created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /documents/categories/{documentCategoryId}:
    patch:
      operationId: updateDocumentCategory
      summary: Update a document category
      parameters:
        - $ref: '#/components/parameters/DocumentCategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCategoryRequest'
      responses:
        '200':
          description: Document category updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/DocumentCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /documents/{documentId}:
    get:
      operationId: getRepositoryDocument
      summary: Load one repository document with governance metadata
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Repository document loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Document'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /documents/{documentId}/download:
    get:
      operationId: downloadRepositoryDocument
      summary: Download one repository document file
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Repository document downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /assets:
    get:
      operationId: listAssets
      summary: List tenant assets with current assignment state
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [available, assigned, issued, returned, maintenance, retired]
        - in: query
          name: asset_category_id
          schema:
            type: integer
        - in: query
          name: employee_id
          schema:
            type: integer
      responses:
        '200':
          description: Assets loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      operationId: createAsset
      summary: Register a new asset in the tenant catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetRequest'
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /assets/categories:
    get:
      operationId: listAssetCategories
      summary: List asset categories
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
      responses:
        '200':
          description: Asset categories loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/AssetCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
    post:
      operationId: createAssetCategory
      summary: Create an asset category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCategoryRequest'
      responses:
        '201':
          description: Asset category created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssetCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /assets/categories/{assetCategoryId}:
    patch:
      operationId: updateAssetCategory
      summary: Update an asset category
      parameters:
        - $ref: '#/components/parameters/AssetCategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetCategoryRequest'
      responses:
        '200':
          description: Asset category updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AssetCategory'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /assets/{assetId}:
    get:
      operationId: getAsset
      summary: Load one asset with current assignment and history
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Asset loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /assets/{assetId}/assign:
    post:
      operationId: assignAsset
      summary: Assign an available or returned asset to an employee
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetAssignRequest'
      responses:
        '200':
          description: Asset assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /assets/{assetId}/issue:
    post:
      operationId: issueAsset
      summary: Mark an assigned asset as issued
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetIssueRequest'
      responses:
        '200':
          description: Asset issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /assets/{assetId}/return:
    post:
      operationId: returnAsset
      summary: Return an assigned or issued asset
      parameters:
        - $ref: '#/components/parameters/AssetId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssetReturnRequest'
      responses:
        '200':
          description: Asset returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Asset'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /policy-acknowledgements:
    get:
      operationId: listPolicyAcknowledgements
      summary: List policy acknowledgement assignments within the caller's access scope
      parameters:
        - in: query
          name: employee_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [assigned, acknowledged]
      responses:
        '200':
          description: Policy acknowledgements loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PolicyAcknowledgement'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
    post:
      operationId: assignPolicyAcknowledgements
      summary: Assign one policy document to one or more employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyAcknowledgementAssignmentRequest'
      responses:
        '201':
          description: Policy acknowledgements assigned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PolicyAcknowledgement'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /policy-acknowledgements/{policyAcknowledgementId}/acknowledge:
    patch:
      operationId: acknowledgePolicyDocument
      summary: Record acknowledgement of one assigned policy document
      parameters:
        - $ref: '#/components/parameters/PolicyAcknowledgementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyAcknowledgementAcknowledgeRequest'
      responses:
        '200':
          description: Policy acknowledgement recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PolicyAcknowledgement'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /policy-acknowledgements/{policyAcknowledgementId}/download:
    get:
      operationId: downloadPolicyAcknowledgementDocument
      summary: Download the document attached to one policy acknowledgement assignment
      parameters:
        - $ref: '#/components/parameters/PolicyAcknowledgementId'
      responses:
        '200':
          description: Policy document downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /task-center:
    get:
      operationId: getEmployeeTaskCenter
      summary: Load the linked employee task-center overview
      responses:
        '200':
          description: Employee task center loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskCenterOverview'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /task-center/lifecycle-tasks/{taskId}:
    patch:
      operationId: updateEmployeeTaskCenterLifecycleTask
      summary: Update one employee-owned lifecycle task from the task center
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleTaskUpdateRequest'
      responses:
        '200':
          description: Lifecycle task updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EmployeeLifecycleTask'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /self-service/workspace:
    get:
      operationId: getEmployeeSelfServiceWorkspace
      summary: Load the linked employee self-service workspace
      responses:
        '200':
          description: Self-service workspace loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/SelfServiceWorkspace'
                    required: [data]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /self-service/employee-documents/{employeeDocumentId}/download:
    get:
      operationId: downloadSelfServiceEmployeeDocument
      summary: Download one employee-master document from self-service
      parameters:
        - $ref: '#/components/parameters/EmployeeDocumentId'
      responses:
        '200':
          description: Employee document downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /self-service/repository-documents/{documentId}/download:
    get:
      operationId: downloadSelfServiceRepositoryDocument
      summary: Download one visible repository document from self-service
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Repository document downloaded
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
  parameters:
    DocumentId:
      in: path
      name: documentId
      required: true
      schema:
        type: integer
    DocumentCategoryId:
      in: path
      name: documentCategoryId
      required: true
      schema:
        type: integer
    AssetId:
      in: path
      name: assetId
      required: true
      schema:
        type: integer
    AssetCategoryId:
      in: path
      name: assetCategoryId
      required: true
      schema:
        type: integer
    PolicyAcknowledgementId:
      in: path
      name: policyAcknowledgementId
      required: true
      schema:
        type: integer
    TaskId:
      in: path
      name: taskId
      required: true
      schema:
        type: integer
    EmployeeDocumentId:
      in: path
      name: employeeDocumentId
      required: true
      schema:
        type: integer
  responses:
    UnauthorizedErrorResponse:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenErrorResponse:
      description: Caller lacks the required permission or scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundErrorResponse:
      description: Requested entity was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationErrorResponse:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorEnvelope'
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
      required: [success, message]
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
        errors:
          type: object
          additionalProperties: true
      required: [success, message]
    ValidationErrorEnvelope:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
          required: [errors]
    EmployeeReference:
      type: object
      properties:
        id:
          type: integer
        employee_code:
          type: string
        full_name:
          type: string
        email:
          type: [string, 'null']
          format: email
      required: [id, employee_code, full_name, email]
    DocumentCategory:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        repository_scope:
          type: string
          enum: [general, employee, policy, compliance, payroll, asset, onboarding, offboarding]
        default_visibility_scope:
          type: string
          enum: [internal, restricted, confidential]
        retention_days:
          type: [integer, 'null']
        allowed_role_names:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
        notes:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time
      required: [id, code, name, repository_scope, default_visibility_scope, retention_days, allowed_role_names, status, notes, created_at, updated_at]
    DocumentCategoryRequest:
      type: object
      properties:
        code:
          type: string
          maxLength: 40
        name:
          type: string
          maxLength: 100
        repository_scope:
          type: string
          enum: [general, employee, policy, compliance, payroll, asset, onboarding, offboarding]
        default_visibility_scope:
          type: string
          enum: [internal, restricted, confidential]
        retention_days:
          type: [integer, 'null']
          minimum: 1
          maximum: 3650
        allowed_role_names:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
        notes:
          type: [string, 'null']
          maxLength: 1000
      required: [code, name, repository_scope, default_visibility_scope, status]
    DocumentCategoryInline:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        default_visibility_scope:
          type: string
          enum: [internal, restricted, confidential]
        retention_days:
          type: [integer, 'null']
        allowed_role_names:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, inactive]
      required: [id, code, name, default_visibility_scope, retention_days, allowed_role_names, status]
    Document:
      type: object
      properties:
        id:
          type: integer
