          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMasterRequest'
      responses:
        '201':
          description: Cost center created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CostCenter'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /organization/cost-centers/{costCenterId}:
    patch:
      operationId: updateCostCenter
      summary: Update a cost center
      parameters:
        - $ref: '#/components/parameters/CostCenterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationMasterRequest'
      responses:
        '200':
          description: Cost center updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CostCenter'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
