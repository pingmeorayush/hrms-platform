  /organization/audit-history:
    get:
      operationId: listOrganizationAuditHistory
      summary: List organization-structure audit history with optional entity filters
      parameters:
        - in: query
          name: entity_type
          schema:
            type: string
            enum: [company, department, designation, location, cost_center]
        - in: query
          name: entity_id
          schema:
            type: integer
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Organization audit history loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedAuditLogEntries'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /employees:
    get:
      operationId: listEmployees
      summary: List tenant employees
      parameters:
        - in: query
          name: search
          description: Prefix search across employee code, email, first name, last name, or first-name plus last-name pairs.
          schema:
            type: string
        - in: query
          name: employment_status
          description: Filter the directory by the employee lifecycle status.
          schema:
            type: string
        - in: query
          name: department_id
          description: Filter the directory by the assigned department.
          schema:
            type: integer
        - in: query
          name: designation_id
          description: Filter the directory by the assigned designation.
          schema:
            type: integer
        - in: query
          name: manager_id
          description: Filter the directory by the assigned reporting manager.
          schema:
            type: integer
        - in: query
          name: per_page
          description: Page size capped at 100 records.
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Employees loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/PaginatedEmployees'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createEmployee
      summary: Create an employee master record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreateRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /employees/bulk-import/validate:
    post:
      operationId: validateEmployeeBulkImport
      summary: Validate a bulk employee onboarding intake without creating records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeBulkImportValidationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EmployeeBulkImportCsvValidationRequest'
      responses:
        '200':
          description: Bulk import validation completed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/EmployeeBulkImportValidationResult'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /employees/{employeeId}:
    patch:
      operationId: updateEmployee
      summary: Update editable employee profile fields
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdateRequest'
      responses:
        '200':
          description: Employee updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Employee'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
