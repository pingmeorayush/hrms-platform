        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /employees/{employeeId}/transfer:
    post:
      operationId: transferEmployee
      summary: Record a department, manager, location, or cost-center transfer
      parameters:
        - $ref: '#/components/parameters/EmployeeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeTransferRequest'
      responses:
