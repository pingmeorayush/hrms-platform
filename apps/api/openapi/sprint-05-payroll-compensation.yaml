        employment_days:
          type: number
        unpaid_days:
          type: number
        lop_days:
          type: number
        overtime_minutes:
          type: integer
        overtime_earnings:
          type: number
        gross_salary:
          type: number
        total_earnings:
          type: number
        total_deductions:
          type: number
        net_salary:
          type: number
        employer_cost:
          type: number
        earnings_breakdown:
