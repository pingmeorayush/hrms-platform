          format: date-time
        reopened_at:
          type: [string, 'null']
          format: date-time
        closed_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        updated_at:
          type: [string, 'null']
          format: date-time
      required: [id, payroll_period_id, name, frequency, start_date, end_date, status, prerequisite_summary, prerequisite_snapshot, input_summary, calculation_summary, items, prepared_at, inputs_generated_at, calculated_at, approved_at, locked_at, reopened_at, closed_at, created_at, updated_at]
