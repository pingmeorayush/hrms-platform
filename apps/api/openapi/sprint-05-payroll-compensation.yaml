          type: array
          items:
            $ref: '#/components/schemas/PayrollInputSnapshotLine'
      required: [payable_days, paid_leave_days, unpaid_leave_days, manual_adjustment_amount, inputs]
    PayrollItem:
      type: object
      properties:
        id:
          type: integer
