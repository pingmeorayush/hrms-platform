      required: [id, employee_id, employee, employee_compensation_id, status, employment_days, unpaid_days, lop_days, overtime_minutes, overtime_earnings, gross_salary, total_earnings, total_deductions, net_salary, employer_cost, earnings_breakdown, deductions_breakdown, employer_contribution_breakdown, input_snapshot, validation_errors, created_at, updated_at]
    PayrollRun:
      type: object
