openapi: 3.1.0
info:
  title: PhoenixHRMS Sprint 03 Attendance and Shift Operations API
  version: 1.0.0
  description: Tenant-scoped attendance capture, calculation, policy, holiday configuration, shift scheduling, assignment, and roster APIs implemented during Sprint 03.
  license:
    name: Proprietary
    identifier: LicenseRef-PhoenixHRMS-Proprietary
servers:
  - url: https://api.phoenixhrms.test/api/v1
security:
  - bearerAuth: []
paths:
  /attendance:
    get:
      operationId: listAttendanceRecords
      summary: List tenant attendance records within the caller's review scope
      parameters:
        - in: query
          name: employee_id
          schema:
            type: integer
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
        - in: query
          name: primary_status
          schema:
            type: string
            enum: [present, half_day, absent, holiday, weekend, incomplete]
        - in: query
          name: state
          schema:
            type: string
            enum: [not_captured, checked_in, checked_out]
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Attendance records loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AttendanceRecord'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'
                        required: [items, meta]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/{attendanceRecordId}:
    get:
      operationId: getAttendanceRecord
      summary: Load one attendance record within the caller's review scope
      parameters:
        - $ref: '#/components/parameters/AttendanceRecordId'
      responses:
        '200':
          description: Attendance record loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceRecord'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
  /attendance/check-in:
    post:
      operationId: createAttendanceCheckIn
      summary: Record an employee check-in with optional device and geolocation metadata
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCheckInRequest'
      responses:
        '201':
          description: Attendance check-in created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceRecord'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/check-out:
    post:
      operationId: createAttendanceCheckOut
      summary: Record an employee check-out with optional device and geolocation metadata
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCheckOutRequest'
      responses:
        '200':
          description: Attendance check-out recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceRecord'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/recalculate:
    post:
      operationId: recalculateAttendanceRecords
      summary: Recalculate attendance outcomes and backfill past absent, holiday, and weekend records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRecalculateRequest'
      responses:
        '200':
          description: Attendance records recalculated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceRecalculationSummary'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/operational-review:
    get:
      operationId: getAttendanceOperationalReview
      summary: Load the operational attendance window for HR or manager review
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: employee_id
          schema:
            type: integer
      responses:
        '200':
          description: Attendance operational review loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          window_date:
                            type: string
                            format: date
                          summary:
                            $ref: '#/components/schemas/AttendanceOperationalReviewSummary'
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AttendanceOperationalRecord'
                        required: [window_date, summary, items]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /attendance/pending-exceptions:
    get:
      operationId: getAttendancePendingExceptions
      summary: Load scoped attendance exception records and pending correction queue items
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: employee_id
          schema:
            type: integer
      responses:
        '200':
          description: Attendance pending exceptions loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          window_date:
                            type: string
                            format: date
                          summary:
                            $ref: '#/components/schemas/AttendancePendingExceptionSummary'
                          attendance_items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AttendanceOperationalRecord'
                          correction_items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AttendanceCorrection'
                        required: [window_date, summary, attendance_items, correction_items]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
  /attendance/corrections:
    get:
      operationId: listAttendanceCorrections
      summary: List attendance corrections within the caller's review scope
      parameters:
        - in: query
          name: employee_id
          schema:
            type: integer
        - in: query
          name: attendance_record_id
          schema:
            type: integer
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, changes_requested]
        - in: query
          name: per_page
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Attendance corrections loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/AttendanceCorrection'
                          meta:
                            $ref: '#/components/schemas/PaginationMeta'
                        required: [items, meta]
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createAttendanceCorrection
      summary: Submit an attendance correction request with preserved original values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCorrectionRequest'
      responses:
        '201':
          description: Attendance correction submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceCorrection'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/corrections/{attendanceCorrectionId}:
    patch:
      operationId: updateAttendanceCorrection
      summary: Approve, reject, or request changes on an attendance correction
      parameters:
        - $ref: '#/components/parameters/AttendanceCorrectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCorrectionDecisionRequest'
      responses:
        '200':
          description: Attendance correction updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendanceCorrection'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/policy:
    get:
      operationId: getAttendancePolicy
      summary: Load the active tenant attendance policy
      responses:
        '200':
          description: Attendance policy loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendancePolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    patch:
      operationId: updateAttendancePolicy
      summary: Update the active tenant attendance policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendancePolicyUpdateRequest'
      responses:
        '200':
          description: Attendance policy updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/AttendancePolicy'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/holiday-calendars:
    get:
      operationId: listHolidayCalendars
      summary: List tenant holiday calendars with configured holidays
      responses:
        '200':
          description: Holiday calendars loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/HolidayCalendar'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createHolidayCalendar
      summary: Create a tenant holiday calendar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HolidayCalendarRequest'
      responses:
        '201':
          description: Holiday calendar created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HolidayCalendar'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/holiday-calendars/{holidayCalendarId}:
    patch:
      operationId: updateHolidayCalendar
      summary: Update a tenant holiday calendar
      parameters:
        - $ref: '#/components/parameters/HolidayCalendarId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HolidayCalendarRequest'
      responses:
        '200':
          description: Holiday calendar updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HolidayCalendar'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/holiday-calendars/{holidayCalendarId}/holidays:
    post:
      operationId: createHoliday
      summary: Create a holiday inside a tenant holiday calendar
      parameters:
        - $ref: '#/components/parameters/HolidayCalendarId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HolidayRequest'
      responses:
        '201':
          description: Holiday created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Holiday'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/holiday-calendars/{holidayCalendarId}/holidays/{holidayId}:
    patch:
      operationId: updateHoliday
      summary: Update a holiday inside a tenant holiday calendar
      parameters:
        - $ref: '#/components/parameters/HolidayCalendarId'
        - $ref: '#/components/parameters/HolidayId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HolidayRequest'
      responses:
        '200':
          description: Holiday updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Holiday'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/shifts:
    get:
      operationId: listShifts
      summary: List tenant shift definitions
      responses:
        '200':
          description: Shift definitions loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createShift
      summary: Create a tenant shift definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftRequest'
      responses:
        '201':
          description: Shift definition created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/shifts/{shiftId}:
    patch:
      operationId: updateShift
      summary: Update a tenant shift definition
      parameters:
        - $ref: '#/components/parameters/ShiftId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftRequest'
      responses:
        '200':
          description: Shift definition updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Shift'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/shift-assignments:
    get:
      operationId: listShiftAssignments
      summary: List tenant shift assignments
      parameters:
        - in: query
          name: assignment_type
          schema:
            type: string
            enum: [employee, department, location]
        - in: query
          name: employee_id
          schema:
            type: integer
        - in: query
          name: department_id
          schema:
            type: integer
        - in: query
          name: location_id
          schema:
            type: integer
      responses:
        '200':
          description: Shift assignments loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShiftAssignment'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createShiftAssignment
      summary: Create an effective-dated shift assignment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftAssignmentRequest'
      responses:
        '201':
          description: Shift assignment created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShiftAssignment'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/shift-assignments/{shiftAssignmentId}:
    patch:
      operationId: updateShiftAssignment
      summary: Update an effective-dated shift assignment
      parameters:
        - $ref: '#/components/parameters/ShiftAssignmentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftAssignmentRequest'
      responses:
        '200':
          description: Shift assignment updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShiftAssignment'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/rosters:
    get:
      operationId: listShiftRosters
      summary: List tenant roster entries
      parameters:
        - in: query
          name: employee_id
          schema:
            type: integer
        - in: query
          name: date_from
          schema:
            type: string
            format: date
        - in: query
          name: date_to
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Roster entries loaded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShiftRoster'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
    post:
      operationId: createShiftRosters
      summary: Schedule roster entries for one or more employees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftRosterBatchRequest'
      responses:
        '201':
          description: Roster entries scheduled
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ShiftRoster'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
  /attendance/rosters/{shiftRosterId}:
    patch:
      operationId: updateShiftRoster
      summary: Update a scheduled roster entry
      parameters:
        - $ref: '#/components/parameters/ShiftRosterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShiftRosterUpdateRequest'
      responses:
        '200':
          description: Roster entry updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ShiftRoster'
        '401':
          $ref: '#/components/responses/UnauthorizedErrorResponse'
        '403':
          $ref: '#/components/responses/ForbiddenErrorResponse'
        '404':
          $ref: '#/components/responses/NotFoundErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
components:
  parameters:
    AttendanceRecordId:
      in: path
      name: attendanceRecordId
      required: true
      schema:
        type: integer
    AttendanceCorrectionId:
      in: path
      name: attendanceCorrectionId
      required: true
      schema:
        type: integer
    HolidayCalendarId:
      in: path
      name: holidayCalendarId
      required: true
      schema:
        type: integer
    HolidayId:
      in: path
      name: holidayId
      required: true
      schema:
        type: integer
    ShiftId:
      in: path
      name: shiftId
      required: true
      schema:
        type: integer
    ShiftAssignmentId:
      in: path
      name: shiftAssignmentId
      required: true
      schema:
        type: integer
    ShiftRosterId:
      in: path
      name: shiftRosterId
      required: true
      schema:
        type: integer
  responses:
    UnauthorizedErrorResponse:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenErrorResponse:
      description: Permission denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundErrorResponse:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationErrorResponse:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
        data: {}
      required: [success, message, data]
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          const: false
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
